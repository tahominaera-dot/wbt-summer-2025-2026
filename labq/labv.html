<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create your account</title>
</head>
<body>

    <div>
        <h2>Registration</h2>
        
        <hr>

        <form>
            <div class="field">
                <label for="full-name">Full Name</label><br>
                <input type="text" id="full-name" placeholder="Jane Doe">
            </div>
            

            <div class ="field">
                <label for="age">age</label><br>
                <input type="number" id="age" placeholder="28">
            </div>
            

            <div="field">
                <label for="dob">Date of Birth</label><br>
                <input type="text" id="dob" placeholder="25/06/2026">
            </div>
            

            <div class="field">
                <label for="email">Email Address</label><br>
                <input type="email" id="email" placeholder="jane@example.com">
            </div>
    

            <div class="field">
                <label for="password">Password</label><br>
                <input type="password" id="password" placeholder="******">
            </div>
            

            <div class="radio"
                  
            <label>Preferred Contact</label>
                    <label><input type="radio" name="contact" value="Email"> Male</label>
                    <label><input type="radio" name="contact" value="Phone"> Female</label>
                    <label><input type="radio" name="contact" value="SMS"> Other</label>
        </div>
            

            <div class="button group">
                <button type="submit" class="btn-primary">Submit</button>        
                <button type="reset" class="btn-secondary">Reset</button>
            </div>
        </form>
    </div>

</body>
</html>
